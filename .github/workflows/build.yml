name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Vosk Russian model
        run: |
          curl -L -o model.zip https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
          unzip -q model.zip
          mkdir -p app/src/main/assets
          rm -rf app/src/main/assets/model-ru
          mv vosk-model-small-ru-0.22 app/src/main/assets/model-ru
          rm -f app/src/main/assets/README_MODEL.txt
          echo "Модель установлена:" && ls app/src/main/assets/model-ru

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GolosRuki-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ГолосРуки — последняя сборка
          files: app/build/outputs/apk/debug/app-debug.apk
